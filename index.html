<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TIMER</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <button id="toggleThemeControlsBtn" class="floating-btn" title="Toggle Theme Controls">
    <i class="fas fa-palette"></i> </button>

  <div id="theme-controls-wrapper">
    <div id="theme-controls">
        <div class="theme-preset-selector-group">
            <label for="themeSelector">Select Theme:</label>
            <select id="themeSelector"></select>
        </div>
        <div class="color-picker-group">
            <label for="textColorPicker">Text Color:</label>
            <input type="color" id="textColorPicker" value="#111111">
        </div>
        <div class="color-picker-group">
            <label for="backgroundColorPicker">Background Color:</label>
            <input type="color" id="backgroundColorPicker" value="#ffffff">
        </div>
        <div class="color-picker-group">
            <label for="accentColorPicker">Accent Color:</label>
            <input type="color" id="accentColorPicker" value="#007bff">
        </div>
        <div class="color-picker-group">
            <label for="highlightColorPicker">Highlight Color:</label>
            <input type="color" id="highlightColorPicker" value="#e0f0ff">
        </div>
        <div class="color-picker-group">
            <label for="errorColorPicker">Error Color:</label>
            <input type="color" id="errorColorPicker" value="#d9534f">
        </div>
        <div class="color-picker-group">
            <label for="successColorPicker">Success Color:</label>
            <input type="color" id="successColorPicker" value="#5cb85c">
        </div>
    </div>
  </div>
  
  <h1>Cube Timer</h1>
  <p id="instructions">Press <strong>Spacebar</strong> to start/stop the timer</p>
  <div id="scramble"></div>
  <label for="cube-type">Choose Cube:</label>
  <select id="cube-type" onchange="handleCubeChange(this.value)">
    <option value="3">3x3</option>
    <option value="2">2x2</option>
    <option value="4">4x4</option>
  </select>
  <div id="timer">0.<span class="millis">00</span></div>
  <h2 id="ao5-label">Ao5 : <span style = "font-size: 3rem; color: var(--accent-color);">--:--</span></h2>
  
  <div class="history-header">
    <h2>Solve History</h2>
    <button onclick="clearSolves()" title="Clear All">
       Clear History
    </button>
  </div>

  <div id="history-container">
    <table id="history"></table>
  </div>

  <script src="myscript.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</body>
</html>
